<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGAVE ECO BAR - PALMARE COMPLETO</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 10px; -webkit-user-select: none; }
        h3, h4 { margin: 10px 0 5px 0; color: #00ffcc; text-transform: uppercase; font-size: 13px; }
        .sezione { background: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #333; }
        .tavolo-input { width: 65px; background: #2a2a2a; color: #fff; border: 2px solid #00ffcc; padding: 6px; font-size: 18px; text-align: center; border-radius: 5px; font-weight: bold; }
        .scatola-contatore { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .input-libero { width: 60px; background: #2a2a2a; color: #fff; border: 1px solid #00ffcc; padding: 8px; font-size: 16px; text-align: center; border-radius: 4px; font-weight: bold; }
        .btn-passo { background: #333; color: #fff; border: 1px solid #555; padding: 8px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .grid-varianti { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .btn-var { background: #1a237e; color: #fff; border: none; padding: 12px 2px; border-radius: 5px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .btn-var.active { background: #00ffcc; color: #000; font-weight: bold; }
        .btn-modo-pagamento { background: #424242; color: #fff; border: 1px solid #666; padding: 10px; border-radius: 5px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .btn-modo-pagamento.active { background: #ff3d00; color: white; border-color: #ff3d00; box-shadow: 0 0 10px #ff3d00; }
        .grid-prodotti { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .item-prodotto { display: flex; background: #2d2d2d; border-radius: 5px; overflow: hidden; border: 1px solid #444; }
        .btn-prodotto { flex: 1; background: transparent; color: #fff; border: none; padding: 14px 4px; text-align: left; font-size: 12px; font-weight: bold; }
        .lista-ordine { max-height: 250px; overflow-y: auto; background: #151515; padding: 5px; border-radius: 5px; }
        .riga-ordine { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid #2a2a2a; font-size: 13px; }
        .riga-ordine.pagato { text-decoration: line-through; color: #666; background: #1a251a; }
        .riga-ordine.stampato { border-left: 4px solid #00ffcc; }
        .btn-elimina { background: #d32f2f; color: white; border: none; padding: 4px 8px; border-radius: 3px; font-weight: bold; margin-right: 6px; }
        .btn-incassa-sub { padding: 6px 10px; border: none; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; cursor: pointer; }
        .incassa-cash { background: #2e7d32; }
        .incassa-pos { background: #1565c0; }
        .area-stampa { display: flex; justify-content: space-between; gap: 6px; }
        .btn-stampa { flex: 1; padding: 15px 5px; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; color: #fff; text-transform: uppercase; }
        .stampa-bar { background: #c62828; }
        .stampa-cucina { background: #00c853; }
        .stampa-cassa { background: #ff6f00; }
        .totale-box { font-size: 18px; font-weight: bold; color: #ff9900; text-align: right; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="sezione" style="display: flex; align-items: center; justify-content: space-between;">
        <div><label style="font-weight: bold; color: #00ffcc; font-size: 13px;">TAVOLO:</label><input type="number" id="num-tavolo" class="tavolo-input" value="1" oninput="caricaTavolo()"></div>
        <div style="flex: 1; margin-left: 10px;"><input type="text" id="info-tavolo" placeholder="Note tavolo..." style="width: 92%; padding: 8px; background: #2a2a2a; border: 1px solid #555; color: white; border-radius: 4px;" onchange="salvaInfoTavolo()"></div>
    </div>
    <div class="sezione" style="border: 1px solid #ff3d00;">
        <h3 style="color: #ff3d00; margin-top: 0;">Opzioni Seconda Serata</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
            <button class="btn-modo-pagamento active" id="p-non-pagato" onclick="impostaStatoVenduta('NON PAGATO')">Da Pagare</button>
            <button class="btn-modo-pagamento" id="p-contanti" onclick="impostaStatoVenduta('CONTANTI')">Cash</button>
            <button class="btn-modo-pagamento" id="p-carta" onclick="impostaStatoVenduta('CARTA')">Carta</button>
        </div>
    </div>
    <div class="sezione">
        <div style="display: flex; justify-content: space-between; gap: 10px;">
            <div style="flex: 1;"><h3>QTA</h3><div class="scatola-contatore"><input type="number" id="qta-libera" class="input-libero" value="1"><button class="btn-passo" onclick="passoContatore('qta-libera', 1)">+1</button></div></div>
            <div style="flex: 1;"><h3>CALICI</h3><div class="scatola-contatore"><input type="number" id="calici-liberi" class="input-libero" value="0"><button class="btn-passo" onclick="passoContatore('calici-liberi', 1)">+1</button></div></div>
        </div>
    </div>
    <div class="sezione">
        <h3>Stato Tavolo</h3>
        <div id="lista-ordine" class="lista-ordine"></div>
        <div class="totale-box" id="box-calcolo-totale">Totale: 0.00 €</div>
    </div>
    <div class="sezione">
        <h3>Listino</h3>
        {% for categoria, prodotti in menu.items() %}
            <h4>{{ categoria }}</h4>
            <div class="grid-prodotti">
                {% if prodotti is mapping %}
                    {% for p, prezzo in prodotti.items() %}
                        <div class="item-prodotto"><button class="btn-prodotto" onclick="processaInserimentoProdotto('{{ p }}', {{ prezzo }})">{{ p }}<br>{{ "%.2f"|format(prezzo) }}€</button></div>
                    {% endfor %}
                {% endif %}
            </div>
        {% endfor %}
    </div>
    <script>
        let variantiAttive = [];
        let modoVendutaCorrente = "NON PAGATO";
        function passoContatore(id, v) { document.getElementById(id).value = parseInt(document.getElementById(id).value) + v; }
        function impostaStatoVenduta(modo) { modoVendutaCorrente = modo; document.querySelectorAll('.btn-modo-pagamento').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); }
        function caricaTavolo() { fetch(`/get_tavolo/${document.getElementById('num-tavolo').value}`).then(res=>res.json()).then(data => { ordineCorrenteTavolo = data.ordine || []; renderizzaOrdine(); }); }
        function processaInserimentoProdotto(p, prezzo) {
            let nome = prompt("Nome:", p);
            if (!nome) return;
            let pr = prompt("Prezzo:", prezzo || 0);
            if (pr === null) return;
            fetch('/add', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tavolo: document.getElementById('num-tavolo').value, prodotto: p, prodotto_modificato: nome, prezzo_personalizzato: parseFloat(pr), quantita: document.getElementById('qta-libera').value }) }).then(() => caricaTavolo());
        }
        window.onload = caricaTavolo;
    </script>
</body>
</html>
